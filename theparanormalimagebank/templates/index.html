{% extends "layout.html" %}

{% block title %}
    Index
{% endblock %}

{% block main %}
    <form action="/" method="post" class="form-inline">
        <div class="mb-3">
            <input class="form-control mx-auto w-auto" name="search" placeholder="search" type="text">
        </div>
        <div class="mb-3">
        <select name ="searchby" placeholder = "search by">
                <option name = "name"> name </option>
                <option name = "translation"> translation/description</option>
        </select>
        </div>
        <button class="btn btn-primary" type="submit">Search</button>
    </form>

    <table>
        <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Translation/description</th>
            
        </tr>
        {% for image in images %}
        <tr>
            <td><img src="data:image/png;base64,{{ image['images'] | b64encode }}" alt="Image"></td>
            <td>{{ image['name'] }}</td>
            <td>{{ image['translation'] }}</td>
            <td><button onclick="openModal('{{ image['id'] }}', '{{ image['translation'] }}', '{{ image['images'] | b64encode }}')">Edit</button></td>

        </tr>
        {% endfor %}
    </table>

        </div>
    </div>
    <script>
        function openModal(id, translation, image) {
             document.getElementById('myModal').style.display = "block";
             document.getElementById('newTranslation').value = translation;
             document.getElementById('modalImage').src = "data:image/png;base64," + image;
             document.getElementById('newTranslation').dataset.id = id;
}

        function submitUpdate() {
            const id = document.getElementById('newTranslation').dataset.id;
            const newTranslation = document.getElementById('newTranslation').value;
            // Make an AJAX request to update the translation
            fetch(`/update_translation`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ id: id, translation: newTranslation })
            }).then(response => {
                if (response.ok) {
                    location.reload();
                }
            });
        }

        // Close the modal when the user clicks on <span> (x)
        document.querySelector('.close').onclick = function() {
            document.getElementById('myModal').style.display = "none";
        }
    </script>

    <style>
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
